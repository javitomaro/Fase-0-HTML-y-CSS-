<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>DIV / SPAN</title>
    </head>
    <!-- Sirven para crear contenedores 
        div = a nivel de conjunto de elementos
        span = linea o trozo concreto        
    -->
    <body>
        <div>
            <img src="img/perro.jpg" alt="EL perro" title="Bulldog durmiendo en una silla blanca" width="200" />
            <p>
                Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quisquam quis iste dolorem vel odio odit quia?
                <span>Distinctio reprehenderit aperiam</span>, fugit consequatur modi nihil porro quas nam doloremque
                vitae dolores consequuntur.
            </p>
        </div>
    </body>
</html>
