<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Elementos de frase</title>
    </head>
    <body>
        <!-- 
            strong = negrita
            em = cursiva
            mark = subrallado efecto rotulador
            sub = bajar texto para formulas
            sup = subir texto para formulas
        -->
        <p>Lorem ipsum dolor sit amet, <strong>consectetur adipisicing elit.</strong> 
        <br><em>Culpa illum eaque dolorem</em> accusamus numquam sunt atque nesciunt <mark>quisquam</mark> dolore, 
        <small>doloribus qui quae adipisci minus iusto rerum ipsa optio aliquid totam!</small></p>
        <p>H<sub>2</sub>O 
        <br>10<sup>3</sup></p>
        <!--Anidación-->
        <strong><em><mark>quisquam</mark></em></strong>
    </body>
</html>
