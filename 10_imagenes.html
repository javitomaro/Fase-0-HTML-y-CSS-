<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Imagenes</title>
    </head>
    <body>
        <!-- 
            src = source, origen de la imagen
            alt = comentario alterno que ayuda a describir el contenido de la imagen
            title = texto que sale al poner el cursor encima
            width = ancho (en pixel o %)
            height = alto (en pixel o %)
            align = alineacion
        -->
        <img src="img/perro.jpg" alt="Cometario para describir la imagen" 
             title="Bulldog durmiendo en una silla blanca" width="480" height="300" align="left">

           Quisquam quis iste dolorem vel odio odit quia?
           Distinctio reprehenderit aperiam, fugit consequatur 
           modi nihil porro quas nam doloremque vitae dolores consequuntur.</p>
    </body>
</html>
